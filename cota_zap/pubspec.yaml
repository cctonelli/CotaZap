name: cota_zap
description: Aplicativo para cotações rápidas de produtos via WhatsApp.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9

  # Supabase (Online DB & Auth)
  supabase_flutter: ^2.4.0

  # Local DB (Offline-first)
  drift: ^2.14.1
  sqlite3_flutter_libs: ^0.5.18
  path_provider: ^2.1.2

  # Routing
  go_router: ^13.1.0

  # Network
  dio: ^5.4.1

  # Utils
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.2
  path: ^1.8.3

  # UI
  flutter_svg: ^2.0.9
  google_fonts: ^6.1.0
  fl_chart: ^0.66.0
  intl: ^0.19.0

  # Payments (Freemium)
  in_app_purchase: ^3.1.11

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  drift_dev: ^2.14.1
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
