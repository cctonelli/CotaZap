version: '3.8'

services:
  # CotaZap Backend (FastAPI)
  backend:
    build:
      context: ./backend
    container_name: cotazap_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@localhost:5432/postgres
      - EVOLUTION_API_URL=http://evolution:8080
      - EVOLUTION_API_KEY=my_secure_api_key
    depends_on:
      - evolution

  # Evolution API (WhatsApp Integration)
  # Documentação: https://doc.evolution-api.com/
  evolution:
    image: atendimentos/evolution-api:latest
    container_name: evolution_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_TYPE=GATEWAY
      - AUTH_RECESS_TIME=1
      - AUTH_TOKEN=my_secure_api_key
      - DELAY_SEND_MESSAGES=2500
    volumes:
      - evolution_instances:/evolution/instances

  # Redis para o Evolution API (Opcional, mas recomendado para performance)
  # redis:
  #   image: redis:alpine
  #   container_name: cotazap_redis
  #   ports:
  #     - "6379:6379"

volumes:
  evolution_instances:
