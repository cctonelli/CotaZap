services:
  # CotaZap Backend (FastAPI)
  backend:
    build:
      context: ./backend
    container_name: cotazap_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://postgres:[SUA_SENHA]@db.juckbmlcantjoyjpotbs.supabase.co:5432/postgres
      - EVOLUTION_API_URL=http://evolution:8080
      - EVOLUTION_API_KEY=429683C4C977415CAAFCCE10F7D57E11
      - EVOLUTION_INSTANCE=cotazap
    depends_on:
      - evolution

  # Banco de dados local EXCLUSIVO para a Evolution API
  # (sessões WhatsApp, mensagens — dados operacionais, não de negócio)
  evolution_db:
    image: postgres:16-alpine
    container_name: evolution_db
    restart: always
    environment:
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=evolution123
      - POSTGRES_DB=evolution_api
    volumes:
      - evolution_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution -d evolution_api"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Evolution API (WhatsApp Integration)
  # Construída a partir do código-fonte local em ../evolution-api-main
  evolution:
    build:
      context: ../evolution-api-main
      dockerfile: Dockerfile
    container_name: evolution_api
    restart: always
    ports:
      # Porta 8181 no host → 8080 interno (evita conflito com EDB Postgres na 8080)
      - "8181:8080"
    depends_on:
      evolution_db:
        condition: service_healthy
    environment:
      # Servidor
      - SERVER_NAME=cotazap
      - SERVER_TYPE=http
      - SERVER_PORT=8080
      - SERVER_URL=http://localhost:8181

      # Banco de dados PostgreSQL LOCAL (sem precisar da senha do Supabase)
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:evolution123@evolution_db:5432/evolution_api?schema=evolution_api
      - DATABASE_CONNECTION_CLIENT_NAME=cotazap_evolution

      # O que salvar no banco
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_MESSAGE_UPDATE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - DATABASE_SAVE_DATA_CHATS=true
      - DATABASE_SAVE_DATA_HISTORIC=true

      # Chave de API para autenticação
      - AUTHENTICATION_API_KEY=429683C4C977415CAAFCCE10F7D57E11
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true

      # Cache local (sem Redis por enquanto)
      - CACHE_REDIS_ENABLED=false
      - CACHE_LOCAL_ENABLED=true

      # Logs
      - LOG_LEVEL=ERROR,WARN,INFO,LOG
      - LOG_COLOR=true
      - LOG_BAILEYS=error

      # QR Code
      - QRCODE_LIMIT=30

      # Sessão WhatsApp
      - CONFIG_SESSION_PHONE_CLIENT=CotaZap
      - CONFIG_SESSION_PHONE_NAME=Chrome

      # CORS
      - CORS_ORIGIN=*
      - CORS_METHODS=GET,POST,PUT,DELETE
      - CORS_CREDENTIALS=true

      # Serviços extras desabilitados
      - RABBITMQ_ENABLED=false
      - SQS_ENABLED=false
      - WEBSOCKET_ENABLED=false
      - PUSHER_ENABLED=false
      - TYPEBOT_ENABLED=false
      - CHATWOOT_ENABLED=false
      - OPENAI_ENABLED=false
      - S3_ENABLED=false
      - DEL_INSTANCE=false
    volumes:
      - evolution_instances:/evolution/instances

volumes:
  evolution_instances:
  evolution_db_data:
